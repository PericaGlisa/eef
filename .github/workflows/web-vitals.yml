name: Web Vitals Budget

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  web-vitals:
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't block deploys if perf tests fail
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        continue-on-error: true

      - name: Run mobile Web Vitals budget
        run: npm run ci:perf
        continue-on-error: true
