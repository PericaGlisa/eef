name: SEO Audit

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  seo-audit:
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't block deploys if SEO audit fails
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        continue-on-error: true

      - name: Run SEO CI checks
        run: npm run ci:seo
        continue-on-error: true
