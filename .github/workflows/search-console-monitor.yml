name: Search Console Monitor

on:
  schedule:
    - cron: "0 6 1 * *"
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "monthly ili alert"
        required: true
        default: "monthly"
        type: choice
        options:
          - monthly
          - alert

jobs:
  monthly-report:
    if: (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'monthly' || github.event_name == 'schedule' && github.event.schedule == '0 6 1 * *') && (secrets.GSC_SERVICE_ACCOUNT_KEY != '' || secrets.GSC_SERVICE_ACCOUNT_KEY_B64 != '' || (secrets.GSC_SERVICE_ACCOUNT_EMAIL != '' && secrets.GSC_SERVICE_ACCOUNT_PRIVATE_KEY != ''))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run monthly Search Console report
        run: npm run seo:gsc:monthly
        env:
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GSC_PROPERTY_URL: ${{ secrets.GSC_PROPERTY_URL }}
          GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
          GSC_SERVICE_ACCOUNT_KEY_B64: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY_B64 }}
          GSC_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GSC_SERVICE_ACCOUNT_EMAIL }}
          GSC_SERVICE_ACCOUNT_PRIVATE_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_PRIVATE_KEY }}

      - name: Upload monthly SEO report
        uses: actions/upload-artifact@v4
        with:
          name: seo-monthly-report
          path: reports/seo
          if-no-files-found: error

  alert-check:
    if: (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'alert' || github.event_name == 'schedule' && github.event.schedule == '0 6 * * *') && (secrets.GSC_SERVICE_ACCOUNT_KEY != '' || secrets.GSC_SERVICE_ACCOUNT_KEY_B64 != '' || (secrets.GSC_SERVICE_ACCOUNT_EMAIL != '' && secrets.GSC_SERVICE_ACCOUNT_PRIVATE_KEY != ''))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore SEO alert state cache
        id: seo-alert-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .seo-monitor-state
          key: seo-alert-state-${{ github.run_id }}
          restore-keys: |
            seo-alert-state-

      - name: Run Search Console alert checks
        run: npm run seo:gsc:alert
        env:
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GSC_PROPERTY_URL: ${{ secrets.GSC_PROPERTY_URL }}
          GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
          GSC_SERVICE_ACCOUNT_KEY_B64: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY_B64 }}
          GSC_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GSC_SERVICE_ACCOUNT_EMAIL }}
          GSC_SERVICE_ACCOUNT_PRIVATE_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_PRIVATE_KEY }}
          SEO_ALERT_WEBHOOK_URL: ${{ secrets.SEO_ALERT_WEBHOOK_URL }}
          GSC_ALERT_STATE_PATH: .seo-monitor-state/latest-alert.json

      - name: Save SEO alert state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .seo-monitor-state
          key: seo-alert-state-${{ github.run_id }}
